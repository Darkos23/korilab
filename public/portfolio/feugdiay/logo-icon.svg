<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- FeugDiay App Icon -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4512A"/>
      <stop offset="100%" stop-color="#A83E1D"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D9921E"/>
      <stop offset="100%" stop-color="#E8AB3A"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="120" height="120" rx="26" fill="url(#bg-grad)"/>

  <!-- Hanger symbol -->
  <g transform="translate(60, 28)">
    <!-- Hook -->
    <path d="M0 0 C0 -5 4 -9 8 -9 C12 -9 16 -5 16 0 C16 3 14.5 5 12 6.5"
          stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"
          transform="translate(-8, 0)"/>
    <!-- Hanger arms -->
    <path d="M0 6 L-28 34 C-33 38 -30 44 -25 44 L25 44 C30 44 33 38 28 34 L0 6Z"
          stroke="white" stroke-width="3.5" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- F D initials at bottom -->
  <text x="36" y="102" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="20" fill="white" opacity="0.9">F</text>
  <text x="68" y="102" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="20" fill="url(#gold-grad)">D</text>
</svg>
