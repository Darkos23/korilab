<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- FeugDiay Wordmark -->
  <defs>
    <linearGradient id="hanger-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4512A"/>
      <stop offset="100%" stop-color="#D9921E"/>
    </linearGradient>
  </defs>

  <!-- Hanger Icon -->
  <g transform="translate(10, 8)">
    <!-- Hanger hook -->
    <path d="M32 6 C32 2.7 34.7 0 38 0 C41.3 0 44 2.7 44 6 C44 8 43 9.5 41.5 10.5"
          stroke="url(#hanger-grad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Hanger body -->
    <path d="M38 10 L12 32 C8 35 10 40 14 40 L62 40 C66 40 68 35 64 32 L38 10Z"
          stroke="url(#hanger-grad)" stroke-width="3" stroke-linejoin="round" fill="none"/>
    <!-- Small fabric detail -->
    <path d="M28 40 L28 52 C28 54 30 56 32 56 L44 56 C46 56 48 54 48 52 L48 40"
          fill="#C4512A" opacity="0.15" rx="2"/>
  </g>

  <!-- Text: Feug -->
  <text x="88" y="52" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="42" letter-spacing="-1.5" fill="#1A0B04">Feug</text>

  <!-- Text: Diay -->
  <text x="220" y="52" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="42" letter-spacing="-1.5" fill="#D9921E">Diay</text>

  <!-- Tagline -->
  <text x="88" y="70" font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif" font-weight="500" font-size="11" letter-spacing="3" fill="#7A5840" text-transform="uppercase">LA FRIPERIE NUMERIQUE</text>
</svg>
