<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,400&family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 800px; height: 500px; margin: 0;
  }
  body {
    background: #1A0B04;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  body::before {
    content: 'FeugDiay';
    position: absolute;
    font-family: 'Fraunces', serif;
    font-size: 180px; font-weight: 900;
    opacity: 0.04; color: white;
    white-space: nowrap; letter-spacing: -4px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .card {
    position: relative; z-index: 1;
    text-align: center;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(196,81,42,0.2); border: 1px solid rgba(196,81,42,0.4);
    border-radius: 100px; padding: 6px 16px;
    font-size: 11px; font-weight: 600; color: #C4512A;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 72px; font-weight: 900;
    color: white; letter-spacing: -3px;
    line-height: 1; margin-bottom: 8px;
  }
  h1 span { color: #D9921E; }
  .tagline {
    color: rgba(255,255,255,0.45);
    font-size: 16px; font-weight: 500;
    margin-bottom: 32px;
  }
  .colors {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 24px;
  }
  .swatch {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .tags {
    display: flex; gap: 8px; justify-content: center;
  }
  .tag {
    background: rgba(196,81,42,0.15);
    border: 1px solid rgba(196,81,42,0.3);
    border-radius: 100px; padding: 4px 14px;
    font-size: 12px; font-weight: 600; color: #C4512A;
  }
  .credit {
    position: absolute; bottom: 20px; right: 24px;
    font-size: 11px; color: rgba(255,255,255,0.2);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Brand Identity</div>
    <h1>Feug<span>Diay</span></h1>
    <p class="tagline">La friperie numerique du Senegal</p>
    <div class="colors">
      <div class="swatch" style="background: #C4512A;"></div>
      <div class="swatch" style="background: #D9921E;"></div>
      <div class="swatch" style="background: #FAF5EE;"></div>
      <div class="swatch" style="background: #2D6A4F;"></div>
      <div class="swatch" style="background: #1A0B04;"></div>
    </div>
    <div class="tags">
      <span class="tag">Logo</span>
      <span class="tag">Charte</span>
      <span class="tag">Design System</span>
    </div>
  </div>
  <div class="credit">KoriLab Studio</div>
</body>
</html>
