<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#050a14"/>

  <!-- Glow effect -->
  <ellipse cx="256" cy="256" rx="100" ry="140" fill="#38bdf820" filter="url(#glow)"/>

  <!-- Cauri shell - scaled and centered (original 60x84 → 240x336, centered in 512x512) -->
  <g transform="translate(136, 88) scale(4)">
    <!-- Outer ellipse -->
    <ellipse cx="30" cy="42" rx="21" ry="30" fill="#38bdf808" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.9"/>

    <!-- Center zigzag -->
    <path d="M30,14 L26,20 L34,26 L26,32 L34,38 L26,44 L34,50 L26,56 L34,62 L30,70"
      stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

    <!-- Left details -->
    <line x1="17" y1="24" x2="24" y2="24" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="16" y1="29" x2="23" y2="29" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <path d="M13,35 L20,40 L13,45" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <path d="M17,35 L24,40 L17,45" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <circle cx="11" cy="42" r="2" fill="#38bdf8" opacity="0.8"/>
    <path d="M13,47 L20,52 L13,57" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <path d="M17,47 L24,52 L17,57" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <line x1="16" y1="60" x2="23" y2="60" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="17" y1="64" x2="23" y2="64" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

    <!-- Right details -->
    <line x1="43" y1="24" x2="36" y2="24" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="44" y1="29" x2="37" y2="29" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <path d="M47,35 L40,40 L47,45" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <path d="M43,35 L36,40 L43,45" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <circle cx="49" cy="42" r="2" fill="#38bdf8" opacity="0.8"/>
    <path d="M47,47 L40,52 L47,57" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <path d="M43,47 L36,52 L43,57" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <line x1="44" y1="60" x2="37" y2="60" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="43" y1="64" x2="37" y2="64" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
    </filter>
  </defs>
</svg>
